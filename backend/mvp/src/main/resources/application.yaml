spring:
  application:
    name: mvp
  datasource:
    # 프로젝트 폴더 내부에 'calorie_db'라는 파일로 데이터를 물리 저장합니다.
    url: jdbc:h2:file:./calorie_db;DB_CLOSE_DELAY=-1;NON_KEYWORDS=KEY,VALUE;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: cw
    password: cw00
  h2:
    console:
      enabled: true
      path: /h2-console # 서버 실행 후 브라우저로 DB를 볼 수 있는 주소
  jpa:
    hibernate:
      ddl-auto: create # update # 엔티티 코드를 수정하면 DB 테이블에 바로 반영
    show-sql: true     # 실행되는 SQL을 터미널에 출력
    properties:
      hibernate:
        format_sql: true